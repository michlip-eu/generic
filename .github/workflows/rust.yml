name: Rust images

on:
  schedule:
    - cron: "0 0 * * 1"
  push:
    branches:
      - main
    paths:
      - ".github/scripts/resolve-runtime-versions.sh"
      - ".github/scripts/generate-runtime-docs.sh"
      - ".github/scripts/push-generated-changes.sh"
      - ".github/workflows/build-runtime.yml"
      - ".github/workflows/rust.yml"
      - "shared.sh"
      - "generic/shared.sh"
      - "generic/rust/**"
      - "docs/versions/rust.md"
      - "docs/versions/rust/**"
  pull_request:
    paths:
      - ".github/scripts/resolve-runtime-versions.sh"
      - ".github/scripts/generate-runtime-docs.sh"
      - ".github/scripts/push-generated-changes.sh"
      - ".github/workflows/build-runtime.yml"
      - ".github/workflows/rust.yml"
      - "shared.sh"
      - "generic/shared.sh"
      - "generic/rust/**"
      - "docs/versions/rust.md"
      - "docs/versions/rust/**"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  RUNTIME: rust
  IMAGE_NAME: ghcr.io/${{ github.repository }}/rust

jobs:
  versions:
    name: Resolve Rust versions
    runs-on: ubuntu-latest
    outputs:
      full-batches: ${{ steps.resolve.outputs['full-batches'] }}
      alpine-batches: ${{ steps.resolve.outputs['alpine-batches'] }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve versions
        id: resolve
        run: |
          result="$(.github/scripts/resolve-runtime-versions.sh "$RUNTIME")"
          echo "$result"
          echo "full-batches=$(echo "$result" | jq -c '[.version_matrix[] | select(.variant.name == "full")] | . as $rows | map(. as $row | . + {latest: ($row.version == $rows[0].version), line_latest: ($row.version == ($rows | map(select(.line == $row.line))[0].version))}) | . as $rows | map(. as $row | . + {latest: ($row.version == $rows[0].version), line_latest: ($row.version == ($rows | map(select(.line == $row.line))[0].version))}) | [range(0; length; 200) as $i | {matrix: (.[$i:$i + 200] | tojson)}]')" >> "$GITHUB_OUTPUT"
          echo "alpine-batches=$(echo "$result" | jq -c '[.version_matrix[] | select(.variant.name == "alpine")] | [range(0; length; 200) as $i | {matrix: (.[$i:$i + 200] | tojson)}]')" >> "$GITHUB_OUTPUT"

      - name: Generate version docs
        run: .github/scripts/generate-runtime-docs.sh "$RUNTIME"
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Persist resolved versions and docs
        if: github.event_name != 'pull_request'
        run: |
          if git diff --quiet -- "generic/$RUNTIME" "docs/versions/$RUNTIME.md" "docs/versions/$RUNTIME"; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "generic/$RUNTIME" "docs/versions/$RUNTIME.md" "docs/versions/$RUNTIME"
          git commit -m "Update $RUNTIME versions and docs [skip ci]"
          .github/scripts/push-generated-changes.sh

  build-full:
    name: Build Rust full images
    needs: versions
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.versions.outputs['full-batches']) }}
    uses: ./.github/workflows/build-runtime.yml
    with:
      display-name: Rust
      image-name: ghcr.io/${{ github.repository }}/rust
      matrix: ${{ matrix.matrix }}
    secrets: inherit

  build-alpine:
    name: Build Rust Alpine images
    needs: versions
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.versions.outputs['alpine-batches']) }}
    uses: ./.github/workflows/build-runtime.yml
    with:
      display-name: Rust
      image-name: ghcr.io/${{ github.repository }}/rust
      matrix: ${{ matrix.matrix }}
    secrets: inherit
