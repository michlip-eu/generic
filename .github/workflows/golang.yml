name: Golang images

on:
  push:
    branches:
      - main
    paths:
      - ".github/scripts/resolve-go-versions.sh"
      - ".github/workflows/golang.yml"
      - "shared.sh"
      - "generic/shared.sh"
      - "generic/golang/**"
  pull_request:
    paths:
      - ".github/scripts/resolve-go-versions.sh"
      - ".github/workflows/golang.yml"
      - "shared.sh"
      - "generic/shared.sh"
      - "generic/golang/**"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/golang

jobs:
  versions:
    name: Resolve Go versions
    runs-on: ubuntu-latest
    outputs:
      latest-version: ${{ steps.resolve.outputs.latest-version }}
      versions: ${{ steps.resolve.outputs.versions }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve versions
        id: resolve
        run: |
          result="$(.github/scripts/resolve-go-versions.sh)"
          echo "$result"
          echo "latest-version=$(echo "$result" | jq -r '.latest_version')" >> "$GITHUB_OUTPUT"
          echo "versions=$(echo "$result" | jq -c '.versions')" >> "$GITHUB_OUTPUT"

      - name: Persist resolved versions
        if: github.event_name != 'pull_request'
        run: |
          if git diff --quiet -- generic/golang/versions.yml; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generic/golang/versions.yml
          git commit -m "Update Go versions [skip ci]"
          git push

  build:
    name: Build Go ${{ matrix.version }} ${{ matrix.variant.name }}
    needs: versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.versions.outputs.versions) }}
        variant:
          - name: full
            base-image: debian:bookworm-slim
            tag-suffix: ""
          - name: alpine
            base-image: alpine:latest
            tag-suffix: "-alpine"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Set tag aliases
        id: tag
        run: |
          echo "minor=$(echo "${{ matrix.version }}" | cut -d. -f1,2)" >> "$GITHUB_OUTPUT"
          echo "suffix=${{ matrix.variant['tag-suffix'] }}" >> "$GITHUB_OUTPUT"
          if [ "${{ matrix.version }}" = "${{ needs.versions.outputs.latest-version }}" ]; then
            echo "latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ matrix.version }}${{ steps.tag.outputs.suffix }}
            type=raw,value=${{ steps.tag.outputs.minor }}${{ steps.tag.outputs.suffix }}
            type=raw,value=latest${{ steps.tag.outputs.suffix }},enable=${{ steps.tag.outputs.latest }}
            type=raw,value=${{ matrix.version }}${{ steps.tag.outputs.suffix }},suffix=-{{sha}}

      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./generic/golang/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=${{ matrix.variant['base-image'] }}
            GO_VERSION=${{ matrix.version }}
            IMAGE_VARIANT=${{ matrix.variant.name }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
