name: Build runtime variant

on:
  workflow_call:
    inputs:
      display-name:
        required: true
        type: string
      image-name:
        required: true
        type: string
      matrix:
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ inputs['display-name'] }} ${{ matrix.version }} ${{ matrix.variant.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include: ${{ fromJson(inputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        env:
          IMAGE_NAME: ${{ inputs['image-name'] }}
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Set tag aliases
        id: tag
        env:
          TAG_SUFFIX: ${{ matrix.variant.tag_suffix }}
          LATEST: ${{ matrix.latest }}
          LINE_LATEST: ${{ matrix.line_latest }}
        run: |
          echo "suffix=$TAG_SUFFIX" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "line-latest=$LINE_LATEST" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ matrix.version }}${{ steps.tag.outputs.suffix }}
            type=raw,value=${{ matrix.line }}${{ steps.tag.outputs.suffix }},enable=${{ steps.tag.outputs['line-latest'] }}
            type=raw,value=latest${{ steps.tag.outputs.suffix }},enable=${{ steps.tag.outputs.latest }}
            type=raw,value=${{ matrix.version }}${{ steps.tag.outputs.suffix }},suffix=-{{sha}}

      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./generic/${{ matrix.runtime }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=${{ matrix.variant.base_image }}
            IMAGE_VARIANT=${{ matrix.variant.name }}
            GO_VERSION=${{ matrix.version }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
